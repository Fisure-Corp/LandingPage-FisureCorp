<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contactos Conductor</title>
    <link rel="stylesheet" href="../../appstyles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Serif&display=swap" rel="stylesheet" />
  </head>
  <body>
    <nav class="top-header">
      <div class="nav-container">
        <button class="menu-toggle" aria-label="Abrir menu">&#9776;</button>
        <ul class="menu-vertical">
          <li><a href="../conductor-index.html">Inicio</a></li>
          <li><a href="perfil.html">Perfil</a></li>
          <li><a href="ajustes.html">Ajustes</a></li>
          <li><a href="#">Contactos</a></li>
          <li><a href="../../login.html">Cerrar Sesion</a></li>
        </ul>
      </div>
    </nav>
    <section id="contactanos" class="contactanos-section">
      <div class="contactanos-container support-network">
        <h2>Red de apoyo del conductor</h2>
        <div class="contactanos-item">
          <img src="../../imagesApp/contacto.png" alt="Maria Torres" />
          <span>Maria Torres - familiar</span>
          <button class="contactanos-icono" title="Llamar">&#9742;</button>
        </div>
        <div class="contactanos-item">
          <img src="../../imagesApp/contacto.png" alt="Central de ruta" />
          <span>Central de ruta - operaciones</span>
          <button class="contactanos-icono" title="Enviar alerta">&#9888;</button>
        </div>
        <div class="contactanos-item">
          <img src="../../imagesApp/contacto.png" alt="Companero de ruta" />
          <span>Victor Salas - companero</span>
          <button class="contactanos-icono" title="Compartir ubicacion">&#10148;</button>
        </div>
        <form class="mini-form">
          <label>Agregar contacto de confianza</label>
          <input placeholder="Nombre y telefono" />
          <button type="button">Guardar contacto</button>
        </form>
        <p class="contactanos-mensaje">Estos contactos reciben alertas rapidas y ubicacion durante emergencias.</p>
      </div>
    </section>
    <script src="../../appjs/menu.js"></script>
  </body>
</html>
